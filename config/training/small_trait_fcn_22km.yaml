# @package _global_
defaults:
  - /models: small_trait_fcn
  - /loss: weighted_masked_dense
  - _self_

data:
  root_dir: /scratch3/plant-traits-v2/data/
  resolution_km: 22
  chips_subdir: chips_centered
  patch_size: 3
  stride: 1

  # Optional quick-run knobs (keep at 1.0 for full-data training).
  train_fraction: 1.0
  val_fraction: 1.0

  predictor_validity_masks:
    enabled: true
    groups: [canopy_height, modis, soil_grids, vodca, worldclim]

  predictors:
    canopy_height:
      use: true
    modis:
      use: true
    soil_grids:
      use: true
    vodca:
      use: true
    worldclim:
      use: true

  targets:
    dataset: supervision
    traits: []
    bands: [mean]

data_loaders:
  batch_size: 64
  num_workers: 4

train:
  seed: 0
  run_name: null
  group: small_trait_fcn_22km
  epochs: 60
  init_checkpoint: null
  init_checkpoint_strict: false

  optimizer:
    _target_: torch.optim.AdamW
    lr: 3e-4
    weight_decay: 1e-5

  loss: ${loss}

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 15
    gamma: 0.7

  scheduler_step:
    mode: epoch
    metric: val_rmse_splot_overall

  gradient_clip_norm: 1.0

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0

  logging:
    log_val_mae_splot: true

  auto_test:
    enabled: true
    test_split: test
    write_all_map: false
    save_arrays: true
    save_full_trait_metrics: true
    log_trait_metrics: false
    output_dir: null

checkpoint_dir: /scratch3/plant-traits-v2/checkpoints/

wandb:
  enabled: true
  entity: plant-traits-v2
  project: Project_PTV2
