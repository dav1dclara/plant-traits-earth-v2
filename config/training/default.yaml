# @package _global_
defaults:
  - /models: respatch
  - _self_

data:
  root_dir: /scratch3/plant-traits-v2/data/
  resolution_km: 22
  chips_dirname: chips_luca
  patch_size: 15
  stride: 10

  predictors:
    canopy_height:
      use: true
    modis:
      use: true
    soil_grids:
      use: true
    vodca:
      use: true
    worldclim:
      use: true

  targets:
    dataset: comb
    traits: []  # Empty means: all traits
    bands: [mean]
    # Used only when the selected target dataset has no dedicated "source" band.
    # 1=GBIF, 2=sPlot. For source-less datasets, all valid labels get this code.
    source_value_if_missing: 2

data_loaders:
  batch_size: 32
  num_workers: 4
  train_fraction: 0.25
  val_fraction: 0.5

train:
  seed: 0
  run_name: null
  group: null
  epochs: 50

  optimizer:
    _target_: torch.optim.Adam
    lr: 2e-4
    weight_decay: 1e-5

  loss:
    _target_: ptev2.loss.WeightedMaskedDenseLoss
    error_type: smooth_l1
    huber_delta: 1.0
    w_gbif: 0.5
    w_splot: 1

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 10
    gamma: 0.7

  scheduler_step:
    mode: epoch
    metric: val_rmse_splot_overall

  gradient_clip_norm: 1.0

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0
    monitor: val_rmse_splot
    mode: min

  logging:
    log_val_mae_splot: true

  auto_test:
    enabled: true
    test_split: test
    write_all_map: false
    save_arrays: true
    save_full_trait_metrics: true
    log_trait_metrics: false
    output_dir: null

checkpoint_dir: /scratch3/plant-traits-v2/checkpoints/

wandb:
  enabled: true
  entity: plant-traits-v2
  project: Project_PTV2_test_luca
