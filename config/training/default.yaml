# Training hyperparameters (epochs, lr, batch size, ...)

batch_size: 32
num_workers: 4

data:
  res: 22
  targets:
    source: gbif  # gbif or splot
    trait_ids: [4]  # empty = all traits
  predictors:
    canopy_height:
      use: true
      bands: []
    modis:
      use: true
      bands: []
    soilgrids:
      use: true
      bands: []
    vodca:
      use: true
      bands: []
    worldclim:
      use: true
      bands: []


data_loaders:
  batch_size: 32
  num_workers: 4
