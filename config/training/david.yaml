# @package _global_
defaults:
  - /models: respatch
  - _self_

data:
  root_dir: /scratch3/plant-traits-v2/data/
  resolution_km: 22
  patch_size: 15
  stride: 10

  predictors:
    canopy_height:
      use: true
    modis:
      use: true
    soil_grids:
      use: true
    vodca:
      use: true
    worldclim:
      use: true

  targets:
    dataset: comb
    traits: []  # Empty means: all traits
    bands: [mean]

data_loaders:
  batch_size: 32
  num_workers: 4

train:
  seed: 42
  epochs: 50
  # run_name: null

  optimizer:
    _target_: torch.optim.Adam
    lr: 2e-4
    weight_decay: 1e-5

  loss:
    _target_: ptev2.loss.WeightedMaskedDenseLoss
    error_type: smooth_l1
    huber_delta: 1.0
    w_gbif: 0.5
    w_splot: 8.0

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 10
    gamma: 0.7

  scheduler_step:
    mode: epoch
    metric: val_rmse_splot_overall

  gradient_clip_norm: 1.0

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0

  logging:
    log_val_mae_splot: true

checkpoint_dir: /scratch3/plant-traits-v2/checkpoints/

wandb:
  enabled: true
  entity: plant-traits-v2
  project: Project_PTV2
