data_dir: "/scratch3/plant-traits-v2/data/"
validity_mask: "${data_dir}1km/predictor_validity_mask.tif"

targets:
  resolution_km: 1

h3:
  resolution: 2

splitting:
  train_frac: 0.70
  val_frac: 0.20
  test_frac: 0.10

jsd:
  bands: [1]
  n_restarts: 500
  n_bins: 50
  random_seed: 42

spatial:
  jsd_tolerance: 0.05  # max fractional JSD degradation allowed during spatial refinement
  n_iters: 10000       # number of swap attempts

debug:
  n_traits: null  # set to an integer to limit to first N traits (e.g. 5 for quick testing)
