paths:
  data_root: /scratch3/plant-traits-v2/data
  resolution: 22km
  eo_input_dir: ${paths.data_root}/${paths.resolution}/eo_data
  eo_output_dir: ${paths.data_root}/${paths.resolution}/eo_data_processed
  params_out: ${paths.data_root}/${paths.resolution}/eo_transform_params.csv

settings:
  dry_run: false
  overwrite: false
  sample_limit: null
  random_seed: 42
  max_fit_pixels: 500000
  transform_chunk_size: 1000000

# Toggle dataset folders here or change the subdirectories for another resolution layout.
datasets:
  canopy_height:
    enabled: true
    input_subdir: canopy_height
    output_subdir: canopy_height
  modis:
    enabled: true
    input_subdir: modis
    output_subdir: modis
  soilgrids:
    enabled: true
    input_subdir: soilgrids
    output_subdir: soil_grids
  vodca:
    enabled: true
    input_subdir: vodca
    output_subdir: vodca
  worldclim:
    enabled: true
    input_subdir: worldclim
    output_subdir: worldclim

dataset_rules:
  modis:
    ndvi_scale: 0.0001
    ndvi_offset: 0.0
    ndvi_valid_min: -0.2
    ndvi_valid_max: 1.0
  vodca:
    valid_min: 0.0
    valid_max: null

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
