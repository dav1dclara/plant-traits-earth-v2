data_dir: "/scratch3/plant-traits-v2/data/"
validity_mask: "${data_dir}22km/predictor_validity_mask.tif"

targets:
  resolution_km: 22

h3:
  resolution: 1

splitting:
  train_frac: 0.70
  val_frac: 0.20
  test_frac: 0.10
  stratum_resolution: 0  # H3 resolution for geographic strata (must be < h3.resolution)

jsd:
  bands: [1]
  n_restarts: 500
  n_bins: 50
  random_seed: 42

cleanup:
  splits: [2]            # which splits to de-cluster (0=train, 1=val, 2=test)
  max_same_neighbors: 0  # max allowed same-split neighbors per cell
  jsd_tolerance: 0.05    # max fractional JSD degradation allowed during cleanup
  n_iters: 10000         # max swap attempts

debug:
  n_traits: null  # set to an integer to limit to first N traits (e.g. 5 for quick testing)
