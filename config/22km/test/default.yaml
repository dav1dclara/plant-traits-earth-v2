# Denormalization stability controls (z-space -> raw units)
denormalization:
  # Clip model outputs in normalized z-space before inverse transform.
  # 3.0 keeps almost all in-distribution predictions while suppressing
  # rare outliers that can explode in raw space for negative lambdas.
  clip_z_abs: 3.0
  # Keep Yeo-Johnson intermediate values inside the mathematical inverse domain.
  clip_to_inverse_domain: true
  # Small positive margin for inverse-domain clipping.
  domain_eps: 1.0e-6
  # Additional safety distance from inverse boundary for predictions.
  domain_margin_ratio: 0.1
  domain_margin_abs: 1.0e-3
  # Optional final cap in raw units; null disables.
  max_abs_output: null
