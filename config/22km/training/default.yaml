# @package _global_
defaults:
  - /models: respatch
  - _self_

data:
  root_dir: /scratch3/plant-traits-v2/data/
  resolution_km: 22
  chips_dirname: chips_luca_new
  patch_size: 7
  stride: 3

  predictors:
    canopy_height:
      use: true
    modis:
      use: true
    soil_grids:
      use: true
    vodca:
      use: true
    worldclim:
      use: true

  targets:
    mode: dual_source_single_head
    primary_dataset: splot
    auxiliary_dataset: gbif
    eval_dataset: splot
    traits: []
    bands: [mean]

data_loaders:
  batch_size: 32
  num_workers: 8
  train_fraction: 1.0
  val_fraction: 1.0
  subset_seed: 0

train:
  seed: 0
  run_name: null
  group: null
  epochs: 25

  optimizer:
    _target_: torch.optim.Adam
    lr: 2e-4
    weight_decay: 1e-5

  loss:
    _target_: ptev2.loss.WeightedMaskedDenseLoss
    error_type: smooth_l1
    huber_delta: 1.0
    w_splot: 1.0
    w_gbif: 0.1

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 15
    gamma: 0.7

  selection:
    metric: val_splot_macro_pearson
    mode: max

  gradient_clip_norm: 1.0

  early_stopping:
    enabled: true
    patience: 8
    min_delta: 0.0

mmoe:
  load_balance_weight: 0.0
  group_consistency_weight: 0.0
  trait_groups:
    - [237, 4, 13, 46, 47, 50, 146, 169, 297, 3106, 3107]
    - [55, 144, 145, 163, 281, 351, 3112, 3113]
    - [3114, 14, 15, 78, 95, 223, 614, 1080, 3117, 3120]
    - [26, 6, 21, 27, 138, 224, 282, 289]

checkpoint_dir: /scratch3/plant-traits-v2/checkpoints/

wandb:
  enabled: true
  entity: plant-traits-v2
  project: Project_PTV2
