name: Deploy viewer to Pages

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    env:
      # Public Worker URL serving the PMTiles archives (not secret). Only the
      # origin is consumed by the viewer; per-trait paths are derived in code.
      VITE_PMTILES_URL: https://ptev2-tiles.davidclara.workers.dev
      # GitHub Project Pages serve at /<repo>/, so production assets need that base.
      VITE_BASE_PATH: /plant-traits-earth-v2/
    steps:
      # Pinned to specific release tags rather than floating v3/v4 — the floating
      # tag points at a SHA that codeload sometimes fails to serve (BC40 errors).
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4.0.5
