name: Deploy viewer to Pages

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    env:
      # Public Worker URL serving the DEM tiles (not secret).
      # To change without editing this file, set a repo Variable of the same name
      # and replace the value with: ${{ vars.VITE_DEM_PMTILES_URL }}
      VITE_DEM_PMTILES_URL: https://ptev2-tiles.davidclara.workers.dev/dem/dem.pmtiles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
